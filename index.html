<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunita · Luz Nocturna</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #f5e6f0;
      --warm: #ffcc88;
      --soft: #ffe0f0;
      --moon: #fff5f8;
      --accent: #e8a0c0;
      --text: #7a5060;
      --star: #ffd580;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 1.2s ease;
      overflow: hidden;
      position: relative;
    }

    body.dark-mode {
      --bg: #1a0f2e;
      --text: #e8c8d8;
      --soft: #2a1540;
    }

    /* Ambient particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
    }

    /* ── MOON ── */
    .moon-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .moon-glow {
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,220,180,0.55) 0%, transparent 70%);
      filter: blur(18px);
      animation: pulseGlow 3s ease-in-out infinite;
      transition: opacity 1s ease;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1);   opacity: 0.9; }
      50%       { transform: scale(1.12); opacity: 1; }
    }

    .moon-svg {
      width: 240px;
      height: 240px;
      filter: drop-shadow(0 12px 32px rgba(255,200,150,0.5));
      transition: filter 1s ease, transform 0.4s ease;
      animation: moonFloat 4s ease-in-out infinite;
    }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-10px) rotate(1deg); }
    }

    .moon-svg:active { transform: scale(0.96); }

    /* face */
    .face { transition: opacity 0.5s ease; }

    /* ── STARS ── */
    .star {
      position: absolute;
      pointer-events: none;
      animation: starFloat ease-in-out infinite, starTwinkle ease-in-out infinite;
    }

    @keyframes starFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(var(--dx), var(--dy)) scale(1.05); }
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 16px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: white;
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(180,120,150,0.18);
      transition: transform 0.2s, box-shadow 0.2s, background 0.4s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(180,120,150,0.28); }
    .btn:active { transform: scale(0.96); }
    .btn.active { background: var(--accent); color: white; }

    /* Brightness slider */
    .slider-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }
    .slider-label { font-size: 12px; color: var(--text); font-weight: 600; opacity: 0.7; letter-spacing: 0.05em; text-transform: uppercase; }
    input[type=range] {
      -webkit-appearance: none;
      width: 180px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(to right, var(--warm), var(--accent));
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 2px 10px rgba(180,100,130,0.3);
      transition: transform 0.2s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

    /* Color dots */
    .colors {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .color-dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: white; transform: scale(1.2); }

    /* Title */
    .title { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; transition: color 1s; }
    .subtitle { font-size: 13px; color: var(--text); opacity: 0.55; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 28px; }

    /* Timer badge */
    .timer-badge {
      position: absolute;
      top: -14px; right: -14px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 800;
      border-radius: 999px;
      padding: 4px 10px;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .timer-badge.show { opacity: 1; transform: scale(1); }

    /* Tap hint */
    .tap-hint {
      font-size: 11px;
      color: var(--text);
      opacity: 0.4;
      margin-top: 12px;
      font-weight: 600;
      animation: hintPulse 2.5s ease-in-out infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
  </style>
</head>
<body id="body">

  <!-- Brightness overlay: black layer on top, opacity = 1 - brightness -->
  <div id="brightnessOverlay" style="
    position:fixed; inset:0; background:#000;
    opacity:0; pointer-events:none;
    transition: opacity 0.4s ease; z-index:999;
  "></div>

  <!-- Screen boost: white layer with screen blend — pushes perceived brightness past device limit -->
  <div id="screenBoost" style="
    position:fixed; inset:0; background:#fff;
    mix-blend-mode:screen;
    opacity:0; pointer-events:none;
    transition: opacity 0.4s ease; z-index:998;
  "></div>

  <!-- Floating particles container -->
  <div id="particles"></div>

  <p class="title">Lunita</p>
  <p class="subtitle">luz nocturna · baby night light</p>

  <!-- MOON -->
  <div class="moon-wrap" id="moonWrap" onclick="toggleLight()">
    <div class="moon-glow" id="moonGlow"></div>

    <!-- Decorative stars -->
    <div class="star" style="top:10px;right:50px;--dx:4px;--dy:-6px;animation-duration:3.2s,2.1s;">
      <svg width="30" height="30" viewBox="0 0 30 30"><polygon points="15,3 18,11 27,11 20,17 22,25 15,20 8,25 10,17 3,11 12,11" fill="#ffd580" opacity="0.95"/></svg>
    </div>
    <div class="star" style="top:60px;right:10px;--dx:-3px;--dy:5px;animation-duration:4s,1.8s;">
      <svg width="20" height="20" viewBox="0 0 30 30"><polygon points="15,3 18,11 27,11 20,17 22,25 15,20 8,25 10,17 3,11 12,11" fill="#ffd580" opacity="0.8"/></svg>
    </div>
    <div class="star" style="top:2px;left:40px;--dx:2px;--dy:4px;animation-duration:2.8s,2.5s;">
      <svg width="14" height="14" viewBox="0 0 30 30"><polygon points="15,3 18,11 27,11 20,17 22,25 15,20 8,25 10,17 3,11 12,11" fill="#ffd580" opacity="0.7"/></svg>
    </div>

    <!-- Timer badge -->
    <div class="timer-badge" id="timerBadge">⏱</div>

    <!-- Moon SVG -->
    <svg class="moon-svg" id="moonSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="moonGrad" cx="35%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#ffffff"/>
          <stop offset="60%"  stop-color="#fff8f5"/>
          <stop offset="100%" stop-color="#ffe8d8"/>
        </radialGradient>
        <radialGradient id="glowInner" cx="50%" cy="80%" r="60%">
          <stop offset="0%"   stop-color="#ffdd99" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#fff8f5" stop-opacity="0"/>
        </radialGradient>
        <filter id="soft">
          <feGaussianBlur stdDeviation="1.5"/>
        </filter>
      </defs>

      <!-- Crescent shape via path -->
      <path id="moonPath"
        d="M100,15
           A85,85 0 1,1 100,185
           A55,60 0 1,0 100,15 Z"
        fill="url(#moonGrad)"
        stroke="none"/>

      <!-- Inner warm glow -->
      <path
        d="M100,15
           A85,85 0 1,1 100,185
           A55,60 0 1,0 100,15 Z"
        fill="url(#glowInner)"/>

      <!-- Face -->
      <g class="face" id="moonFace">
        <!-- Left eye -->
        <circle cx="75" cy="105" r="5" fill="#c07080" opacity="0.9"/>
        <!-- Right eye -->
        <circle cx="100" cy="102" r="5" fill="#c07080" opacity="0.9"/>
        <!-- Smile -->
        <path d="M72,118 Q87,130 103,118" stroke="#c07080" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Blush left -->
        <ellipse cx="64" cy="116" rx="7" ry="4" fill="#e8a0b0" opacity="0.4"/>
        <!-- Blush right -->
        <ellipse cx="110" cy="113" rx="7" ry="4" fill="#e8a0b0" opacity="0.4"/>
      </g>

      <!-- Shine spot -->
      <ellipse cx="68" cy="45" rx="14" ry="8" fill="white" opacity="0.5" transform="rotate(-20,68,45)"/>
    </svg>
  </div>

  <p class="tap-hint" id="tapHint">toca la luna para encender ✨</p>

  <!-- CONTROLS -->
  <div class="controls" id="controls" style="opacity:0.4;pointer-events:none;transition:opacity 0.5s;">

    <!-- Color presets -->
    <div style="width:100%;display:flex;justify-content:center;">
      <div class="colors" id="colorPicker">
        <div class="color-dot selected" style="background:#ffdd99;" data-warm="#ffdd99" data-bg="#f5e6f0" onclick="setColor(this)"></div>
        <div class="color-dot" style="background:#b0e0ff;" data-warm="#b0e0ff" data-bg="#e0f0ff" onclick="setColor(this)"></div>
        <div class="color-dot" style="background:#b8f0c0;" data-warm="#b8f0c0" data-bg="#e0f5e8" onclick="setColor(this)"></div>
        <div class="color-dot" style="background:#ffb0d0;" data-warm="#ffb0d0" data-bg="#f5e0ec" onclick="setColor(this)"></div>
        <div class="color-dot" style="background:#d0b0ff;" data-warm="#d0b0ff" data-bg="#ede0f5" onclick="setColor(this)"></div>
      </div>
    </div>

    <!-- Brightness -->
    <div class="slider-wrap" style="width:100%;">
      <span class="slider-label">Brillo</span>
      <input type="range" min="10" max="100" value="80" id="brightnessSlider" oninput="setBrightness(this.value)" />
    </div>

    <!-- Timer buttons -->
    <button class="btn" onclick="setTimer(15)">15 min</button>
    <button class="btn" onclick="setTimer(30)">30 min</button>
    <button class="btn" onclick="setTimer(60)">1 hora</button>
    <button class="btn" onclick="setTimer(0)">∞</button>


  </div>

  <script>
    // ─── STATE ───────────────────────────────
    let isOn = false;
    let brightness = 80;
    let currentWarm = '#ffdd99';
    let timerInterval = null;
    let timerSeconds = 0;
    let darkMode = true;

    const body       = document.getElementById('body');
    const controls   = document.getElementById('controls');
    const moonGlow   = document.getElementById('moonGlow');
    const moonPath   = document.getElementById('moonPath');
    const tapHint    = document.getElementById('tapHint');
    const timerBadge = document.getElementById('timerBadge');

    // ─── PARTICLES ───────────────────────────
    const particleContainer = document.getElementById('particles');
    function spawnParticle() {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random() * 8;
      p.style.width  = size + 'px';
      p.style.height = size + 'px';
      p.style.left   = (10 + Math.random() * 80) + 'vw';
      p.style.bottom = '-10px';
      p.style.background = isOn ? currentWarm : 'transparent';
      p.style.animationDuration = (6 + Math.random() * 8) + 's';
      p.style.animationDelay    = Math.random() * 4 + 's';
      particleContainer.appendChild(p);
      setTimeout(() => p.remove(), 14000);
    }
    setInterval(() => { if (isOn) spawnParticle(); }, 800);

    // ─── TOGGLE LIGHT ────────────────────────
    function toggleLight() {
      isOn = !isOn;
      applyLight();
    }

    function applyLight() {
      const t = isOn ? (brightness / 100) : 0; // 0..1
      const overlay = document.getElementById('brightnessOverlay');

      // Overlay: at brightness=0 → nearly black (0.92), at brightness=100 → gone (0)
      overlay.style.opacity = isOn ? (1 - t) * 0.92 : 0;

      // Glow size and intensity scale aggressively with brightness
      const glowPx    = isOn ? 10 + t * 80 : 0;
      const glowAlpha = isOn ? 0.2 + t * 0.8 : 0;
      document.getElementById('moonSvg').style.filter = isOn
        ? `drop-shadow(0 0 ${glowPx}px ${currentWarm}) drop-shadow(0 0 ${glowPx * 1.8}px ${currentWarm}) drop-shadow(0 12px 32px rgba(255,200,150,${glowAlpha}))`
        : 'none';

      // Moon glow div
      moonGlow.style.opacity = isOn ? (0.3 + t * 0.7).toString() : '0';

      // Background ambient — kicks in after 20%
      const bgAlpha = Math.max(0, (t - 0.2) / 0.8);
      const hex = Math.round(bgAlpha * 180).toString(16).padStart(2, '0');
      const baseBg = darkMode ? '#1a0f2e' : '#f5e6f0';
      body.style.background = isOn
        ? `radial-gradient(ellipse at 50% 55%, ${currentWarm}${hex} 0%, ${baseBg} 70%)`
        : baseBg;

      // Controls
      controls.style.opacity = isOn ? '1' : '0.4';
      controls.style.pointerEvents = isOn ? 'all' : 'none';

      tapHint.textContent = isOn ? 'toca para apagar 🌙' : 'toca la luna para encender ✨';

      // Moon warm gradient stop
      document.querySelector('#moonGrad stop:last-child')
        .setAttribute('stop-color', isOn ? currentWarm : '#ffe8d8');
    }

    // ─── COLOR ───────────────────────────────
    function setColor(dot) {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      currentWarm = dot.dataset.warm;
      document.documentElement.style.setProperty('--warm', currentWarm);
      applyLight();
    }

    // ─── BRIGHTNESS ──────────────────────────
    function setBrightness(val) {
      brightness = parseInt(val);
      applyLight();
    }

    // ─── TIMER ───────────────────────────────
    function setTimer(minutes) {
      clearInterval(timerInterval);
      document.querySelectorAll('.controls .btn').forEach(b => {
        if (['15 min','30 min','1 hora','∞'].includes(b.textContent)) b.classList.remove('active');
      });
      event.target.classList.add('active');

      if (minutes === 0) {
        timerBadge.classList.remove('show');
        return;
      }

      timerSeconds = minutes * 60;
      timerBadge.textContent = formatTime(timerSeconds);
      timerBadge.classList.add('show');

      timerInterval = setInterval(() => {
        timerSeconds--;
        timerBadge.textContent = formatTime(timerSeconds);
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          timerBadge.classList.remove('show');
          isOn = false;
          applyLight();
        }
      }, 1000);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    // Dark mode siempre activo
    body.classList.add('dark-mode');

    // ─── SCREEN BOOST ────────────────────────
    // slider 10-100 → zona 80-100 empuja brillo más allá del hardware
    const screenBoost = document.getElementById("screenBoost");
    const _baseApply = applyLight;
    applyLight = function () {
      _baseApply();
      if (!isOn) { screenBoost.style.opacity = 0; return; }
      const t = brightness / 100;
      screenBoost.style.opacity = t >= 0.8 ? ((t - 0.8) / 0.2) * 0.45 : 0;
    };

    // ─── WAKE LOCK ────────────────────────────
    let wakeLock = null;
    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) return;
      try { wakeLock = await navigator.wakeLock.request("screen"); } catch(e) {}
    }
    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && isOn) requestWakeLock();
    });
    const _origToggle = toggleLight;
    toggleLight = function () {
      _origToggle();
      if (isOn) requestWakeLock(); else releaseWakeLock();
    };
  </script>
</body>
</html>
